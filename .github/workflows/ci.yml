# ─── CI: Lint(nb) → Typecheck → Unit → E2E(nb) → Build ──────────────────────
# Non-blocking: Lint, E2E (potřebují infra/jsou flaky). Hard gate: Build.
name: CI
on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main] }
concurrency: { group: "ci-${{ github.ref }}", cancel-in-progress: true }
env: { NODE_VERSION: "22" }
jobs:
  quality:
    name: "Lint · Typecheck · Test · Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install
        run: npm ci || npm install || true
      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Unit tests (skip if absent)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test?0:1)" 2>/dev/null; then npm test; else echo "::notice::no test script"; fi
      - name: E2E (non-blocking — needs infra)
        continue-on-error: true
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ]; then npx playwright install --with-deps chromium && npx playwright test || true; else echo "::notice::no playwright"; fi
      - name: Build (HARD GATE — skip if no script)
        run: npm run build --if-present
